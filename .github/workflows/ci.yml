name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: 型チェック
        run: npm run typecheck
      - name: ユニットテスト
        run: npm test
      - name: ビルド
        run: npm run build
